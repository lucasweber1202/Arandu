name: Arandu CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: arandu-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ARANDU_SITE_URL: https://arandu.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci --include=optional

      - name: Full source and contract checks
        run: npm run check:all

      - name: Build
        run: npm run build

      - name: SEO in built output
        run: npm run check:seo:dist

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Desktop and mobile journeys
        run: npm run test:e2e

      - name: Upload browser evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: arandu-playwright-evidence
          path: |
            reports/playwright
            test-results
          if-no-files-found: ignore
          retention-days: 7
