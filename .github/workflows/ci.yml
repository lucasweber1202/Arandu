name: Arandu CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        run: npm install --include=optional

      - name: Build
        run: npm run build

      - name: Launch readiness
        run: npm run check:ready

      - name: Quality gate
        run: npm run check:quality

      - name: UX launch checks
        run: npm run check:ux
